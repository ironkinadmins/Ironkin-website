<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar | Ironkin Clan</title>
  <link rel="icon" type="image/png" href="assets/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="siteNav"></div>

<main class="page">
    <section class="page-title">
      <p class="eyebrow">Ironkin Events</p>
      <h1>Calendar</h1>
      <p>Upcoming clan events, masses, giveaways, competitions, and deadlines.</p>
    </section>

    <div class="calendar-filters" id="calendarFilters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="sotw">SOTW</button>
      <button data-filter="botw">BOTW</button>
      <button data-filter="mass">Masses</button>
      <button data-filter="giveaway">Giveaways</button>
      <button data-filter="challenge">Challenges</button>
    </div>

    <section class="calendar-card">
      <div class="calendar-header">
        <button id="prevMonthBtn">←</button>
        <h2 id="calendarMonthTitle">Loading...</h2>
        <button id="nextMonthBtn">→</button>
      </div>

      <div class="calendar-weekdays">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>

      <div id="calendarGrid" class="calendar-grid">
        Loading calendar...
      </div>
    </section>
  </main>

  <footer>
    <p>© Ironkin Clan. Not affiliated with Jagex.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
